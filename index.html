<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESC Bingo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Phase 1: Start -->
  <section id="phase-1" class="phase phase--active" aria-hidden="false">
    <div class="phase__inner phase__inner--center">
      <h1 class="headline">Dein ESC Bingo</h1>
      <p class="subline">Erstell individuelle Bingo-Karten für den Eurovision Song Contest — perfekt für die Party.</p>
      <button id="btn-start" class="btn btn--primary btn--large">Bingo-Karten erstellen</button>
    </div>
  </section>

  <!-- Phase 2: Konfigurieren -->
  <section id="phase-2" class="phase" aria-hidden="true">
    <div class="phase__inner phase__inner--config">

      <button id="btn-back" type="button" class="btn--back">← Zurück</button>

      <!-- Minimal hero: immer sichtbar -->
      <div class="count-hero">
        <p class="count-label">Wie viele Karten?</p>
        <div class="stepper" role="group" aria-label="Anzahl Karten">
          <button id="btn-decrement" type="button" class="stepper__btn" aria-label="Weniger">−</button>
          <span id="card-count-display" class="stepper__value" aria-live="polite">1</span>
          <button id="btn-increment" type="button" class="stepper__btn" aria-label="Mehr">+</button>
        </div>
        <p id="pool-count" class="pool-count" aria-live="polite">0 von mindestens 24 Feldern gewählt</p>
        <button id="btn-generate" class="btn btn--primary btn--large">Karten generieren</button>
      </div>

      <!-- Progressive disclosure: Felder anpassen -->
      <details id="field-customizer" class="customizer">
        <summary class="customizer__toggle">
          <span>Felder anpassen</span>
          <span class="customizer__arrow" aria-hidden="true">›</span>
        </summary>

        <div class="customizer__body">

          <!-- Ebene 0: Rastergröße -->
          <details class="customizer-section" open>
            <summary class="customizer-section__toggle">
              <span>Rastergröße</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <div class="grid-size-selector" role="group" aria-label="Rastergröße wählen">
                <label class="grid-size-option">
                  <input type="radio" name="grid-size" value="3" class="grid-size-radio" />
                  <span>3×3</span>
                </label>
                <label class="grid-size-option">
                  <input type="radio" name="grid-size" value="4" class="grid-size-radio" />
                  <span>4×4</span>
                </label>
                <label class="grid-size-option">
                  <input type="radio" name="grid-size" value="5" class="grid-size-radio" checked />
                  <span>5×5</span>
                </label>
              </div>
            </div>
          </details>

          <!-- Ebene 1: Bestehende Klischees -->
          <details class="customizer-section">
            <summary class="customizer-section__toggle">
              <span>Bestehende Klischees</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <div class="section-controls">
                <button id="btn-select-all" type="button" class="btn btn--ghost btn--sm">Alle</button>
                <button id="btn-deselect-all" type="button" class="btn btn--ghost btn--sm">Keine</button>
              </div>
              <div id="preset-tags" class="tag-cloud" role="group" aria-label="ESC-Klischees"></div>
            </div>
          </details>

          <!-- Ebene 2: Eigene Felder -->
          <details class="customizer-section">
            <summary class="customizer-section__toggle">
              <span>Eigene Felder hinzufügen</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <div class="custom-input-row">
                <input
                  id="custom-input"
                  type="text"
                  class="input"
                  placeholder="Eigenes Feld eingeben… (max. 40 Zeichen)"
                  maxlength="40"
                  aria-label="Eigenes Feld eingeben"
                />
                <button id="btn-add-custom" type="button" class="btn btn--secondary btn--sm">+</button>
              </div>
              <div id="custom-chips" class="chip-list" aria-label="Eigene Felder" role="list"></div>
            </div>
          </details>

          <!-- Ebene 3: Freifeld -->
          <details class="customizer-section">
            <summary class="customizer-section__toggle">
              <span>Freifeld ⭐</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <label class="option-row">
                <input type="checkbox" id="opt-free-field" class="option-checkbox" checked />
                <span class="option-label">Freifeld in der Mitte aktivieren</span>
              </label>
            </div>
          </details>

        </div>
      </details>

    </div>
  </section>

  <!-- Phase 3: Karte anzeigen -->
  <section id="phase-3" class="phase" aria-hidden="true">
    <div class="phase__inner">
      <h2
        id="card-title"
        class="card-title"
        contenteditable="true"
        spellcheck="false"
        title="Klicken zum Bearbeiten"
        aria-label="Kartentitel, klicken zum Bearbeiten"
      >ESC Bingo</h2>
      <nav class="card-nav" id="card-nav" aria-label="Karten-Navigation">
        <button id="btn-prev" class="card-nav__btn" aria-label="Vorherige Karte">←</button>
        <span id="card-nav-counter" class="card-nav__counter" aria-live="polite">Karte 1 von 1</span>
        <button id="btn-next" class="card-nav__btn" aria-label="Nächste Karte">→</button>
      </nav>
      <div id="card-container"></div>
      <div class="card-actions">
        <button id="btn-print" class="btn btn--primary">Drucken / Als PDF speichern</button>
        <button id="btn-new-card" class="btn btn--secondary">Weitere Karte +</button>
      </div>
    </div>
  </section>

  <script type="module" src="app.js"></script>
</body>
</html>
