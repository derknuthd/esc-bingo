<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESC Bingo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Phase 1: Start -->
  <section id="phase-1" class="phase phase--active" aria-hidden="false">
    <div class="phase__inner phase__inner--center">
      <h1 class="headline">Dein ESC Bingo</h1>
      <div class="mode-cards">
        <button id="btn-mode-classic" class="btn btn--primary btn--large mode-card" type="button">ESC Classic</button>
        <button id="btn-mode-kids" class="btn btn--primary btn--large mode-card" type="button">Kinder-Modus</button>
      </div>
      <p id="mode-error" class="mode-error" hidden>Presets konnten nicht geladen werden. Bitte Seite neu laden.</p>
    </div>
  </section>

  <!-- Phase 2: Konfigurieren + Drucken -->
  <section id="phase-2" class="phase" aria-hidden="true">
    <div class="phase__inner phase__inner--config">

      <button id="btn-back" type="button" class="btn--back">← Zurück</button>

      <h2
        id="card-title"
        class="card-title"
        contenteditable="true"
        spellcheck="false"
        title="Klicken zum Bearbeiten"
        aria-label="Kartentitel, klicken zum Bearbeiten"
      >ESC Bingo</h2>

      <!-- Live card preview -->
      <div class="card-preview-wrap">
        <div id="card-preview" class="card-preview">
          <div class="card-nav" id="card-nav" hidden>
            <button id="btn-prev" class="card-nav__btn" aria-label="Vorherige Karte">‹</button>
            <button id="btn-next" class="card-nav__btn" aria-label="Nächste Karte">›</button>
          </div>
        </div>
        <button id="btn-toggle-customizer" type="button" class="btn--configure-link"
          aria-expanded="false">Bingo konfigurieren</button>
      </div>

      <!-- Felder-Anpassung -->
      <div id="field-customizer" class="customizer">

        <div class="customizer__body">

          <!-- Ebene 0: Rastergröße -->
          <details class="customizer-section" open>
            <summary class="customizer-section__toggle">
              <span>Rastergröße</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <div class="grid-size-selector" role="group" aria-label="Rastergröße wählen">
                <label class="grid-size-option">
                  <input type="radio" name="grid-size" value="3" class="grid-size-radio" />
                  <span>3×3</span>
                </label>
                <label class="grid-size-option">
                  <input type="radio" name="grid-size" value="4" class="grid-size-radio" />
                  <span>4×4</span>
                </label>
                <label class="grid-size-option">
                  <input type="radio" name="grid-size" value="5" class="grid-size-radio" />
                  <span>5×5</span>
                </label>
              </div>
            </div>
          </details>

          <!-- Ebene 1: Bingo-Vorlagen -->
          <details class="customizer-section">
            <summary class="customizer-section__toggle">
              <span>Bingo-Vorlagen</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <div class="section-controls">
                <button id="btn-select-all" type="button" class="btn btn--ghost btn--sm">Alle</button>
                <button id="btn-deselect-all" type="button" class="btn btn--ghost btn--sm">Keine</button>
              </div>
              <div id="preset-tags" aria-label="Bingo-Vorlagen"></div>
            </div>
          </details>

          <!-- Ebene 2: Eigene Felder -->
          <details class="customizer-section">
            <summary class="customizer-section__toggle">
              <span>Eigene Felder hinzufügen</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <div class="custom-input-row">
                <input
                  id="custom-input"
                  type="text"
                  class="input"
                  placeholder="Eigenes Feld eingeben… (max. 40 Zeichen)"
                  maxlength="40"
                  aria-label="Eigenes Feld eingeben"
                />
                <button id="btn-add-custom" type="button" class="btn btn--secondary btn--sm">+</button>
              </div>
              <div id="custom-chips" class="chip-list" aria-label="Eigene Felder" role="list"></div>
            </div>
          </details>

          <!-- Ebene 3: Freifeld -->
          <details class="customizer-section">
            <summary class="customizer-section__toggle">
              <span>Freifeld ⭐</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <label class="option-row">
                <input type="checkbox" id="opt-free-field" class="option-checkbox" checked />
                <span class="option-label">Freifeld in der Mitte aktivieren</span>
              </label>
            </div>
          </details>

          <!-- Ebene 4: Kinder-Optionen (nur im Kinder-Modus) -->
          <details class="customizer-section" id="kids-options-section" hidden>
            <summary class="customizer-section__toggle">
              <span>Kinder-Optionen</span>
              <span class="customizer__arrow" aria-hidden="true">›</span>
            </summary>
            <div class="customizer-section__body">
              <label class="option-row">
                <input type="checkbox" id="opt-uppercase" class="option-checkbox" checked />
                <span class="option-label">Alles in Großbuchstaben</span>
              </label>
            </div>
          </details>

        </div>
      </div>

      <!-- Sticky footer: Anzahl + Drucken -->
      <div class="phase2-footer">
        <div class="stepper" role="group" aria-label="Anzahl Karten">
          <button id="btn-decrement" type="button" class="stepper__btn" aria-label="Weniger">−</button>
          <input
            id="card-count-display"
            type="number"
            class="stepper__value"
            value="1"
            min="1"
            max="20"
            aria-label="Anzahl Karten"
          />
          <button id="btn-increment" type="button" class="stepper__btn" aria-label="Mehr">+</button>
        </div>
        <button id="btn-generate" class="btn btn--primary">Drucken</button>
      </div>

    </div>
  </section>

  <!-- Druckcontainer (screen: unsichtbar, print: sichtbar) -->
  <div id="print-container"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
