<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ESC Bingo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Phase 1: Start -->
  <section id="phase-1" class="phase phase--active" aria-hidden="false">
    <div class="phase__inner phase__inner--center">
      <h1 class="headline">Dein ESC Bingo</h1>
      <p class="subline">Erstell individuelle Bingo-Karten für den Eurovision Song Contest — perfekt für die Party.</p>
      <button id="btn-start" class="btn btn--primary btn--large">Bingo-Karten erstellen</button>
    </div>
  </section>

  <!-- Phase 2: Konfigurieren (minimal) -->
  <section id="phase-2" class="phase" aria-hidden="true">
    <div class="phase__inner phase__inner--center">
      <button id="btn-back" type="button" class="btn--back">← Zurück</button>

      <div class="count-section">
        <p class="count-label">Wie viele Karten?</p>
        <div class="stepper" role="group" aria-label="Anzahl Karten">
          <button id="btn-decrement" type="button" class="stepper__btn" aria-label="Weniger">−</button>
          <span id="card-count-display" class="stepper__value" aria-live="polite">1</span>
          <button id="btn-increment" type="button" class="stepper__btn" aria-label="Mehr">+</button>
        </div>
      </div>

      <button id="btn-generate" class="btn btn--primary btn--large">Karten generieren</button>

      <button id="btn-open-drawer" type="button" class="btn--subtle">Felder anpassen ›</button>
    </div>
  </section>

  <!-- Phase 3: Karte anzeigen -->
  <section id="phase-3" class="phase" aria-hidden="true">
    <div class="phase__inner">
      <div class="card-actions">
        <button id="btn-print" class="btn btn--primary">Drucken / Als PDF speichern</button>
        <button id="btn-new-card" class="btn btn--secondary">Weitere Karte</button>
      </div>
      <div id="card-container"></div>
    </div>
  </section>

  <!-- Drawer: Felder anpassen -->
  <dialog id="field-drawer" aria-label="Felder anpassen">
    <div class="drawer">
      <header class="drawer__header">
        <h2 class="drawer__title">Felder anpassen</h2>
        <button id="btn-close-drawer" type="button" class="drawer__close" aria-label="Schließen">✕</button>
      </header>

      <div class="drawer__body">
        <div class="drawer-section">
          <div class="drawer-section__label">Klischees auf der Karte</div>
          <div class="drawer-section__controls">
            <button id="btn-select-all" type="button" class="btn btn--ghost btn--sm">Alle</button>
            <button id="btn-deselect-all" type="button" class="btn btn--ghost btn--sm">Keine</button>
          </div>
          <div id="preset-tags" class="tag-cloud" role="group" aria-label="ESC-Klischees"></div>
        </div>

        <div class="drawer-section">
          <div class="drawer-section__label">Eigene Felder</div>
          <div class="custom-input-row">
            <input
              id="custom-input"
              type="text"
              class="input"
              placeholder="Eigenes Feld eingeben…"
              maxlength="60"
              aria-label="Eigenes Feld eingeben"
            />
            <button id="btn-add-custom" type="button" class="btn btn--secondary btn--sm">+</button>
          </div>
          <div id="custom-chips" class="chip-list" aria-label="Eigene Felder" role="list"></div>
        </div>

        <label class="option-row drawer-section">
          <input type="checkbox" id="opt-free-field" class="option-checkbox" checked />
          <span class="option-label">⭐ Freifeld in der Mitte</span>
        </label>
      </div>

      <footer class="drawer__footer">
        <button id="btn-close-drawer-done" type="button" class="btn btn--primary btn--large">Fertig</button>
      </footer>
    </div>
  </dialog>

  <script type="module" src="app.js"></script>
</body>
</html>
